<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine?</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffdae0; /* Soft Pink */
            font-family: 'Arial', sans-serif;
        }

        .card {
            background-color: white;
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 400px;
            min-height: 300px;
            position: relative; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            color: #d63384;
            font-size: 2rem;
            margin-bottom: 2rem;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 40px; /* Space between Yes and No */
            height: 50px;
            position: relative;
        }

        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            z-index: 1;
        }

        #noBtn {
            background-color: #f8f9fa;
            color: #6c757d;
            border: 1px solid #dee2e6;
            /* No absolute position yet! */
        }

        .success-content {
            display: none;
        }

        img {
            width: 250px;
            border-radius: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <div id="questionSection">
            <h1>Will you be my Valentine?</h1>
            <div class="btn-container">
                <button id="yesBtn" onclick="celebrate()">Yes</button>
                <button id="noBtn" onmouseover="moveButton()">No</button>
            </div>
        </div>

        <div id="successSection" class="success-content">
            <h1>Yay! I knew it! ❤️</h1>
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbmZpZ3FqbmZqbmZqbmZqbmZqbmZqbmZqbmZqbmZqbmZqbmZqbmZqJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZNo/KzM1lAfJ9SdwF7rcp3/giphy.gif" alt="Happy Cat">
        </div>
    </div>

    <script>
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const card = document.getElementById('mainCard');
            
            // On first hover, switch to absolute positioning
            if (noBtn.style.position !== 'absolute') {
                noBtn.style.position = 'absolute';
            }

            // Calculate boundaries relative to the card
            // We subtract button size and padding to keep it inside
            const padding = 20;
            const maxWidth = card.clientWidth - noBtn.clientWidth - padding;
            const maxHeight = card.clientHeight - noBtn.clientHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxWidth));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxHeight));

            noBtn.style.left = randomX + "px";
            noBtn.style.top = randomY + "px";
        }

        function celebrate() {
            document.getElementById('questionSection').style.display = 'none';
            document.getElementById('successSection').style.display = 'block';
        }
    </script>
</body>
</html>
